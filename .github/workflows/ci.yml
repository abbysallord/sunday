name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: core
        run: |
          pip install -e ".[dev]"
      - name: Lint
        working-directory: core
        run: |
          ruff check sunday/
          ruff format --check sunday/
      - name: Test
        working-directory: core
        run: pytest -v --cov=sunday

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: gui
        run: npm ci
      - name: Lint
        working-directory: gui
        run: npm run lint
      - name: Build
        working-directory: gui
        run: npm run build
